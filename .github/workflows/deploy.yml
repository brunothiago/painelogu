name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unblock wedged GitHub Pages deployments
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          echo "Cancelando deployment preso 490ca4..."
          gh api -X POST "repos/${GITHUB_REPOSITORY}/pages/deployments/490ca4cca2f4478a5a14fb4bdb711826cf8804f2/cancel" || true

          echo "Limpando registros antigos do environment github-pages..."
          ids=$(gh api "repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=30" --jq '.[].id')
          for id in ${ids}; do
            gh api -X POST "repos/${GITHUB_REPOSITORY}/deployments/${id}/statuses" -f state=inactive >/dev/null 2>&1 || true
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/deployments/${id}" >/dev/null 2>&1 || true
          done
          sleep 30

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Retry deploy after cleanup
        if: failure() && steps.deployment.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh api -X POST "repos/${GITHUB_REPOSITORY}/pages/deployments/490ca4cca2f4478a5a14fb4bdb711826cf8804f2/cancel" || true
          sleep 45

      - name: Deploy to GitHub Pages (retry)
        if: failure() && steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
