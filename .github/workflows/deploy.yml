name: Deploy redirect

# Este repositório foi aposentado: o painel agora vive em
# https://thiagobruno.com.br/painelpac/ogu/ (repo brunothiago/painelpac).
# O deploy publica apenas os stubs de redirect em redirect/.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload redirect stubs
        uses: actions/upload-pages-artifact@v3
        with:
          path: redirect

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
